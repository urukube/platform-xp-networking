---
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: xunetworks.networking.platform.urukube.io
  labels:
    provider: aws
spec:
  compositeTypeRef:
    apiVersion: networking.platform.urukube.io/v1alpha1
    kind: XUNetwork
  mode: Pipeline
  pipeline:
    # -------------------------------------------------------------------------
    # Step 1 — Resolve EnvironmentConfigs into the pipeline context.
    # Merges org-defaults (static) with the BU-specific config.
    # -------------------------------------------------------------------------
    - step: resolve-environment
      functionRef:
        name: function-environment-configs
      input:
        apiVersion: environmentconfigs.fn.crossplane.io/v1beta1
        kind: Input
        spec:
          environmentConfigs:
            - type: Reference
              ref:
                name: org-defaults
            - type: Selector
              selector:
                matchLabels:
                  - key: bu-id
                    type: FromCompositeFieldPath
                    valueFromFieldPath: spec.parameters.buId

    # -------------------------------------------------------------------------
    # Step 2 — ProviderConfig (static, one per composite).
    # Chains the orchestrator IRSA role into the target account.
    # -------------------------------------------------------------------------
    - step: patch-and-transform
      functionRef:
        name: function-patch-and-transform
      input:
        apiVersion: pt.fn.crossplane.io/v1beta1
        kind: Resources
        resources:
          - name: provider-config
            base:
              apiVersion: aws.upbound.io/v1beta1
              kind: ProviderConfig
              spec:
                credentials:
                  source: IRSA
                assumeRoleChain:
                  - roleARN: placeholder
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.name
                toFieldPath: metadata.name
              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.awsAccountId
                toFieldPath: spec.assumeRoleChain[0].roleARN
                transforms:
                  - type: string
                    string:
                      type: Format
                      fmt: "arn:aws:iam::%s:role/urukube-crossplane-role"
            readinessChecks:
              - type: None

    # -------------------------------------------------------------------------
    # Step 3 — VPC core: VPC, IGW, and all subnets.
    # Only step that contains the CIDR auto-computation logic.
    # -------------------------------------------------------------------------
    - step: vpc-core
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $params  := .observed.composite.resource.spec.parameters }}
            {{- $obs     := default (dict) .observed.resources }}
            {{- $clsName := printf "%s-eks" $params.friendlyName }}
            {{- $pcRef   := .observed.composite.resource.metadata.name }}

            {{- $readyMap := dict }}
            {{- range $crn, $res := $obs }}
            {{- range $res.resource.status.conditions }}
            {{- if and (eq .type "Ready") (eq .status "True") }}
            {{- $readyMap = merge $readyMap (dict $crn "True") }}
            {{- end }}
            {{- end }}
            {{- end }}

            {{- /* ----------------------------------------------------------------
                 CIDR auto-computation — mirrors terraform-module-networking/locals.tf.
                 If the caller omits subnet CIDR arrays, compute them from vpcCidr:
                   EKS nodes:  cidrsubnet(vpcCidr, 3, idx)           → /19 at offset 0..N-1
                   Resources:  cidrsubnet(vpcCidr, 3, numAzs + idx)  → /19 after EKS
                   Public:     cidrsubnet(vpcCidr, 8, 192 + idx)     → /24 at offset 192+
                 Powers-of-2 lookup avoids needing a 'pow' function (index = exponent).
                 ---------------------------------------------------------------- */}}
            {{- $cidrParts := splitList "/" $params.vpcCidr }}
            {{- $vpcPrefix := last $cidrParts | int }}
            {{- $ipOctets  := splitList "." (first $cidrParts) }}
            {{- $o0 := index $ipOctets 0 | int }}
            {{- $o1 := index $ipOctets 1 | int }}
            {{- $o2 := index $ipOctets 2 | int }}
            {{- $o3 := index $ipOctets 3 | int }}
            {{- $baseIp := add (mul $o0 16777216) (mul $o1 65536) (mul $o2 256) $o3 }}
            {{- $pow2 := list 1 2 4 8 16 32 64 128 256 512 1024 2048 4096 8192 16384 32768 65536 131072 262144 524288 1048576 2097152 4194304 8388608 16777216 }}
            {{- $numAzs := len $params.azs }}

            {{- $eksSubnetCidrs := list }}
            {{- if $params.eksNodeSubnetCidrs }}
            {{- $eksSubnetCidrs = $params.eksNodeSubnetCidrs }}
            {{- else }}
            {{- $eksPrefix := add $vpcPrefix 3 }}
            {{- $eksBlock  := index $pow2 (sub 32 $eksPrefix) }}
            {{- range $i, $az := $params.azs }}
            {{- $s := add $baseIp (mul $eksBlock $i) }}
            {{- $eksSubnetCidrs = append $eksSubnetCidrs (printf "%d.%d.%d.%d/%d" (div $s 16777216) (div (mod $s 16777216) 65536) (div (mod $s 65536) 256) (mod $s 256) $eksPrefix) }}
            {{- end }}
            {{- end }}

            {{- $resSubnetCidrs := list }}
            {{- if $params.resourceSubnetCidrs }}
            {{- $resSubnetCidrs = $params.resourceSubnetCidrs }}
            {{- else }}
            {{- $resPrefix := add $vpcPrefix 3 }}
            {{- $resBlock  := index $pow2 (sub 32 $resPrefix) }}
            {{- range $i, $az := $params.azs }}
            {{- $s := add $baseIp (mul $resBlock (add $numAzs $i)) }}
            {{- $resSubnetCidrs = append $resSubnetCidrs (printf "%d.%d.%d.%d/%d" (div $s 16777216) (div (mod $s 16777216) 65536) (div (mod $s 65536) 256) (mod $s 256) $resPrefix) }}
            {{- end }}
            {{- end }}

            {{- $pubSubnetCidrs := list }}
            {{- if $params.publicSubnetCidrs }}
            {{- $pubSubnetCidrs = $params.publicSubnetCidrs }}
            {{- else }}
            {{- $pubPrefix := add $vpcPrefix 8 }}
            {{- $pubBlock  := index $pow2 (sub 32 $pubPrefix) }}
            {{- range $i, $az := $params.azs }}
            {{- $s := add $baseIp (mul $pubBlock (add 192 $i)) }}
            {{- $pubSubnetCidrs = append $pubSubnetCidrs (printf "%d.%d.%d.%d/%d" (div $s 16777216) (div (mod $s 16777216) 65536) (div (mod $s 65536) 256) (mod $s 256) $pubPrefix) }}
            {{- end }}
            {{- end }}

            ---
            apiVersion: ec2.aws.upbound.io/v1beta1
            kind: VPC
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: vpc
                {{- if index $readyMap "vpc" }}
                gotemplating.fn.crossplane.io/ready: "True"
                {{- end }}
              labels:
                resource: vpc
            spec:
              forProvider:
                region: {{ $params.region }}
                cidrBlock: {{ $params.vpcCidr }}
                enableDnsHostnames: true
                enableDnsSupport: true
                tags:
                  Name: {{ printf "%s-vpc" $params.friendlyName }}
                  env: {{ $params.env }}
                  bu_id: {{ $params.buId }}
              providerConfigRef:
                name: {{ $pcRef }}

            ---
            apiVersion: ec2.aws.upbound.io/v1beta1
            kind: InternetGateway
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: igw
                {{- if index $readyMap "igw" }}
                gotemplating.fn.crossplane.io/ready: "True"
                {{- end }}
              labels:
                resource: igw
            spec:
              forProvider:
                region: {{ $params.region }}
                vpcIdSelector:
                  matchControllerRef: true
                  matchLabels:
                    resource: vpc
                tags:
                  Name: {{ printf "%s-igw" $params.friendlyName }}
                  env: {{ $params.env }}
                  bu_id: {{ $params.buId }}
              providerConfigRef:
                name: {{ $pcRef }}

            {{- range $i, $az := $params.azs }}

            ---
            apiVersion: ec2.aws.upbound.io/v1beta1
            kind: Subnet
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: {{ printf "subnet-eks-%d" $i }}
                {{- if index $readyMap (printf "subnet-eks-%d" $i) }}
                gotemplating.fn.crossplane.io/ready: "True"
                {{- end }}
              labels:
                tier: eks-nodes
                az-index: {{ printf "%d" $i | quote }}
            spec:
              forProvider:
                region: {{ $params.region }}
                availabilityZone: {{ $az }}
                cidrBlock: {{ index $eksSubnetCidrs $i }}
                vpcIdSelector:
                  matchControllerRef: true
                  matchLabels:
                    resource: vpc
                mapPublicIpOnLaunch: false
                tags:
                  Name: {{ printf "%s-eks-nodes-%s" $params.friendlyName $az }}
                  env: {{ $params.env }}
                  bu_id: {{ $params.buId }}
                  kubernetes.io/role/internal-elb: "1"
                  {{ printf "kubernetes.io/cluster/%s" $clsName }}: shared
              providerConfigRef:
                name: {{ $pcRef }}

            ---
            apiVersion: ec2.aws.upbound.io/v1beta1
            kind: Subnet
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: {{ printf "subnet-res-%d" $i }}
                {{- if index $readyMap (printf "subnet-res-%d" $i) }}
                gotemplating.fn.crossplane.io/ready: "True"
                {{- end }}
              labels:
                tier: resources
                az-index: {{ printf "%d" $i | quote }}
            spec:
              forProvider:
                region: {{ $params.region }}
                availabilityZone: {{ $az }}
                cidrBlock: {{ index $resSubnetCidrs $i }}
                vpcIdSelector:
                  matchControllerRef: true
                  matchLabels:
                    resource: vpc
                mapPublicIpOnLaunch: false
                tags:
                  Name: {{ printf "%s-resources-%s" $params.friendlyName $az }}
                  env: {{ $params.env }}
                  bu_id: {{ $params.buId }}
                  Tier: resources
              providerConfigRef:
                name: {{ $pcRef }}

            ---
            apiVersion: ec2.aws.upbound.io/v1beta1
            kind: Subnet
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: {{ printf "subnet-pub-%d" $i }}
                {{- if index $readyMap (printf "subnet-pub-%d" $i) }}
                gotemplating.fn.crossplane.io/ready: "True"
                {{- end }}
              labels:
                tier: public
                az-index: {{ printf "%d" $i | quote }}
            spec:
              forProvider:
                region: {{ $params.region }}
                availabilityZone: {{ $az }}
                cidrBlock: {{ index $pubSubnetCidrs $i }}
                vpcIdSelector:
                  matchControllerRef: true
                  matchLabels:
                    resource: vpc
                mapPublicIpOnLaunch: false
                tags:
                  Name: {{ printf "%s-public-%s" $params.friendlyName $az }}
                  env: {{ $params.env }}
                  bu_id: {{ $params.buId }}
                  kubernetes.io/role/elb: "1"
                  {{ printf "kubernetes.io/cluster/%s" $clsName }}: shared
              providerConfigRef:
                name: {{ $pcRef }}

            {{- end }}{{/* end range azs */}}

    # -------------------------------------------------------------------------
    # Step 4 — NAT infrastructure: EIPs and NAT Gateways.
    # singleNatGateway=true  → 1 EIP + 1 NAT GW in AZ[0]'s public subnet
    # singleNatGateway=false → 1 EIP + 1 NAT GW per AZ
    # -------------------------------------------------------------------------
    - step: nat
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $params := .observed.composite.resource.spec.parameters }}
            {{- $obs    := default (dict) .observed.resources }}
            {{- $pcRef  := .observed.composite.resource.metadata.name }}

            {{- $readyMap := dict }}
            {{- range $crn, $res := $obs }}
            {{- range $res.resource.status.conditions }}
            {{- if and (eq .type "Ready") (eq .status "True") }}
            {{- $readyMap = merge $readyMap (dict $crn "True") }}
            {{- end }}
            {{- end }}
            {{- end }}

            {{- $natAzs := $params.azs }}
            {{- if $params.singleNatGateway }}{{- $natAzs = slice $params.azs 0 1 }}{{- end }}

            {{- range $i, $az := $natAzs }}
            ---
            apiVersion: ec2.aws.upbound.io/v1beta1
            kind: EIP
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: {{ printf "eip-%d" $i }}
                {{- if index $readyMap (printf "eip-%d" $i) }}
                gotemplating.fn.crossplane.io/ready: "True"
                {{- end }}
              labels:
                resource: eip
                az-index: {{ printf "%d" $i | quote }}
            spec:
              forProvider:
                region: {{ $params.region }}
                domain: vpc
                tags:
                  Name: {{ printf "%s-natgw-eip-%s" $params.friendlyName $az }}
                  env: {{ $params.env }}
                  bu_id: {{ $params.buId }}
              providerConfigRef:
                name: {{ $pcRef }}

            ---
            apiVersion: ec2.aws.upbound.io/v1beta1
            kind: NATGateway
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: {{ printf "natgw-%d" $i }}
                {{- if index $readyMap (printf "natgw-%d" $i) }}
                gotemplating.fn.crossplane.io/ready: "True"
                {{- end }}
              labels:
                resource: natgw
                az-index: {{ printf "%d" $i | quote }}
            spec:
              forProvider:
                region: {{ $params.region }}
                connectivityType: public
                allocationIdSelector:
                  matchControllerRef: true
                  matchLabels:
                    resource: eip
                    az-index: {{ printf "%d" $i | quote }}
                subnetIdSelector:
                  matchControllerRef: true
                  matchLabels:
                    tier: public
                    az-index: {{ printf "%d" $i | quote }}
                tags:
                  Name: {{ printf "%s-natgw-%s" $params.friendlyName $az }}
                  env: {{ $params.env }}
                  bu_id: {{ $params.buId }}
              providerConfigRef:
                name: {{ $pcRef }}
            {{- end }}{{/* end range natAzs */}}

    # -------------------------------------------------------------------------
    # Step 5 — Routing: route tables, routes, and subnet associations.
    # Public RT shared; private RTs are 1 (singleNatGateway) or N per AZ.
    # Intra RT for resource subnets has no internet route.
    # -------------------------------------------------------------------------
    - step: routing
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $params := .observed.composite.resource.spec.parameters }}
            {{- $obs    := default (dict) .observed.resources }}
            {{- $pcRef  := .observed.composite.resource.metadata.name }}

            {{- $readyMap := dict }}
            {{- range $crn, $res := $obs }}
            {{- range $res.resource.status.conditions }}
            {{- if and (eq .type "Ready") (eq .status "True") }}
            {{- $readyMap = merge $readyMap (dict $crn "True") }}
            {{- end }}
            {{- end }}
            {{- end }}

            ---
            apiVersion: ec2.aws.upbound.io/v1beta1
            kind: RouteTable
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: rt-public
                {{- if index $readyMap "rt-public" }}
                gotemplating.fn.crossplane.io/ready: "True"
                {{- end }}
              labels:
                rt-tier: public
            spec:
              forProvider:
                region: {{ $params.region }}
                vpcIdSelector:
                  matchControllerRef: true
                  matchLabels:
                    resource: vpc
                tags:
                  Name: {{ printf "%s-rt-public" $params.friendlyName }}
                  env: {{ $params.env }}
                  bu_id: {{ $params.buId }}
              providerConfigRef:
                name: {{ $pcRef }}

            ---
            apiVersion: ec2.aws.upbound.io/v1beta1
            kind: Route
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: route-public-igw
                {{- if index $readyMap "route-public-igw" }}
                gotemplating.fn.crossplane.io/ready: "True"
                {{- end }}
            spec:
              forProvider:
                region: {{ $params.region }}
                routeTableIdSelector:
                  matchControllerRef: true
                  matchLabels:
                    rt-tier: public
                destinationCidrBlock: "0.0.0.0/0"
                gatewayIdSelector:
                  matchControllerRef: true
                  matchLabels:
                    resource: igw
              providerConfigRef:
                name: {{ $pcRef }}

            {{- range $i, $az := $params.azs }}
            ---
            apiVersion: ec2.aws.upbound.io/v1beta1
            kind: RouteTableAssociation
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: {{ printf "rta-pub-%d" $i }}
                {{- if index $readyMap (printf "rta-pub-%d" $i) }}
                gotemplating.fn.crossplane.io/ready: "True"
                {{- end }}
            spec:
              forProvider:
                region: {{ $params.region }}
                routeTableIdSelector:
                  matchControllerRef: true
                  matchLabels:
                    rt-tier: public
                subnetIdSelector:
                  matchControllerRef: true
                  matchLabels:
                    tier: public
                    az-index: {{ printf "%d" $i | quote }}
              providerConfigRef:
                name: {{ $pcRef }}
            {{- end }}

            {{- if $params.singleNatGateway }}
            ---
            apiVersion: ec2.aws.upbound.io/v1beta1
            kind: RouteTable
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: rt-private-0
                {{- if index $readyMap "rt-private-0" }}
                gotemplating.fn.crossplane.io/ready: "True"
                {{- end }}
              labels:
                rt-tier: private
                az-index: "0"
            spec:
              forProvider:
                region: {{ $params.region }}
                vpcIdSelector:
                  matchControllerRef: true
                  matchLabels:
                    resource: vpc
                tags:
                  Name: {{ printf "%s-rt-private" $params.friendlyName }}
                  env: {{ $params.env }}
                  bu_id: {{ $params.buId }}
              providerConfigRef:
                name: {{ $pcRef }}

            ---
            apiVersion: ec2.aws.upbound.io/v1beta1
            kind: Route
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: route-private-natgw-0
                {{- if index $readyMap "route-private-natgw-0" }}
                gotemplating.fn.crossplane.io/ready: "True"
                {{- end }}
            spec:
              forProvider:
                region: {{ $params.region }}
                routeTableIdSelector:
                  matchControllerRef: true
                  matchLabels:
                    rt-tier: private
                    az-index: "0"
                destinationCidrBlock: "0.0.0.0/0"
                natGatewayIdSelector:
                  matchControllerRef: true
                  matchLabels:
                    resource: natgw
                    az-index: "0"
              providerConfigRef:
                name: {{ $pcRef }}

            {{- range $i, $az := $params.azs }}
            ---
            apiVersion: ec2.aws.upbound.io/v1beta1
            kind: RouteTableAssociation
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: {{ printf "rta-priv-%d" $i }}
                {{- if index $readyMap (printf "rta-priv-%d" $i) }}
                gotemplating.fn.crossplane.io/ready: "True"
                {{- end }}
            spec:
              forProvider:
                region: {{ $params.region }}
                routeTableIdSelector:
                  matchControllerRef: true
                  matchLabels:
                    rt-tier: private
                    az-index: "0"
                subnetIdSelector:
                  matchControllerRef: true
                  matchLabels:
                    tier: eks-nodes
                    az-index: {{ printf "%d" $i | quote }}
              providerConfigRef:
                name: {{ $pcRef }}
            {{- end }}

            {{- else }}{{/* multi NAT GW — one RT per AZ */}}
            {{- range $i, $az := $params.azs }}
            ---
            apiVersion: ec2.aws.upbound.io/v1beta1
            kind: RouteTable
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: {{ printf "rt-private-%d" $i }}
                {{- if index $readyMap (printf "rt-private-%d" $i) }}
                gotemplating.fn.crossplane.io/ready: "True"
                {{- end }}
              labels:
                rt-tier: private
                az-index: {{ printf "%d" $i | quote }}
            spec:
              forProvider:
                region: {{ $params.region }}
                vpcIdSelector:
                  matchControllerRef: true
                  matchLabels:
                    resource: vpc
                tags:
                  Name: {{ printf "%s-rt-private-%s" $params.friendlyName $az }}
                  env: {{ $params.env }}
                  bu_id: {{ $params.buId }}
              providerConfigRef:
                name: {{ $pcRef }}

            ---
            apiVersion: ec2.aws.upbound.io/v1beta1
            kind: Route
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: {{ printf "route-private-natgw-%d" $i }}
                {{- if index $readyMap (printf "route-private-natgw-%d" $i) }}
                gotemplating.fn.crossplane.io/ready: "True"
                {{- end }}
            spec:
              forProvider:
                region: {{ $params.region }}
                routeTableIdSelector:
                  matchControllerRef: true
                  matchLabels:
                    rt-tier: private
                    az-index: {{ printf "%d" $i | quote }}
                destinationCidrBlock: "0.0.0.0/0"
                natGatewayIdSelector:
                  matchControllerRef: true
                  matchLabels:
                    resource: natgw
                    az-index: {{ printf "%d" $i | quote }}
              providerConfigRef:
                name: {{ $pcRef }}

            ---
            apiVersion: ec2.aws.upbound.io/v1beta1
            kind: RouteTableAssociation
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: {{ printf "rta-priv-%d" $i }}
                {{- if index $readyMap (printf "rta-priv-%d" $i) }}
                gotemplating.fn.crossplane.io/ready: "True"
                {{- end }}
            spec:
              forProvider:
                region: {{ $params.region }}
                routeTableIdSelector:
                  matchControllerRef: true
                  matchLabels:
                    rt-tier: private
                    az-index: {{ printf "%d" $i | quote }}
                subnetIdSelector:
                  matchControllerRef: true
                  matchLabels:
                    tier: eks-nodes
                    az-index: {{ printf "%d" $i | quote }}
              providerConfigRef:
                name: {{ $pcRef }}
            {{- end }}{{/* end range azs (multi NAT) */}}
            {{- end }}{{/* end singleNatGateway if/else */}}

            {{- /* Intra (resource) route table — no internet route */}}
            ---
            apiVersion: ec2.aws.upbound.io/v1beta1
            kind: RouteTable
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: rt-intra
                {{- if index $readyMap "rt-intra" }}
                gotemplating.fn.crossplane.io/ready: "True"
                {{- end }}
              labels:
                rt-tier: intra
            spec:
              forProvider:
                region: {{ $params.region }}
                vpcIdSelector:
                  matchControllerRef: true
                  matchLabels:
                    resource: vpc
                tags:
                  Name: {{ printf "%s-rt-intra" $params.friendlyName }}
                  env: {{ $params.env }}
                  bu_id: {{ $params.buId }}
              providerConfigRef:
                name: {{ $pcRef }}

            {{- range $i, $az := $params.azs }}
            ---
            apiVersion: ec2.aws.upbound.io/v1beta1
            kind: RouteTableAssociation
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: {{ printf "rta-intra-%d" $i }}
                {{- if index $readyMap (printf "rta-intra-%d" $i) }}
                gotemplating.fn.crossplane.io/ready: "True"
                {{- end }}
            spec:
              forProvider:
                region: {{ $params.region }}
                routeTableIdSelector:
                  matchControllerRef: true
                  matchLabels:
                    rt-tier: intra
                subnetIdSelector:
                  matchControllerRef: true
                  matchLabels:
                    tier: resources
                    az-index: {{ printf "%d" $i | quote }}
              providerConfigRef:
                name: {{ $pcRef }}
            {{- end }}

    # -------------------------------------------------------------------------
    # Step 6 — Security groups and rules.
    # SGs: eks-nodes, eks-control-plane, aws-resources.
    # -------------------------------------------------------------------------
    - step: security-groups
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $params := .observed.composite.resource.spec.parameters }}
            {{- $obs    := default (dict) .observed.resources }}
            {{- $pcRef  := .observed.composite.resource.metadata.name }}

            {{- $readyMap := dict }}
            {{- range $crn, $res := $obs }}
            {{- range $res.resource.status.conditions }}
            {{- if and (eq .type "Ready") (eq .status "True") }}
            {{- $readyMap = merge $readyMap (dict $crn "True") }}
            {{- end }}
            {{- end }}
            {{- end }}

            ---
            apiVersion: ec2.aws.upbound.io/v1beta1
            kind: SecurityGroup
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: sg-eks-nodes
                {{- if index $readyMap "sg-eks-nodes" }}
                gotemplating.fn.crossplane.io/ready: "True"
                {{- end }}
              labels:
                sg-for: eks-nodes
            spec:
              forProvider:
                region: {{ $params.region }}
                description: Security group for EKS worker nodes
                vpcIdSelector:
                  matchControllerRef: true
                  matchLabels:
                    resource: vpc
                tags:
                  Name: {{ printf "%s-eks-nodes-sg" $params.friendlyName }}
                  env: {{ $params.env }}
                  bu_id: {{ $params.buId }}
              providerConfigRef:
                name: {{ $pcRef }}

            ---
            apiVersion: ec2.aws.upbound.io/v1beta1
            kind: SecurityGroupIngressRule
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: sgr-nodes-vpc-ingress
                {{- if index $readyMap "sgr-nodes-vpc-ingress" }}
                gotemplating.fn.crossplane.io/ready: "True"
                {{- end }}
            spec:
              forProvider:
                region: {{ $params.region }}
                securityGroupIdSelector:
                  matchControllerRef: true
                  matchLabels:
                    sg-for: eks-nodes
                cidrIpv4: {{ $params.vpcCidr }}
                ipProtocol: "-1"
                description: Allow all traffic from VPC CIDR
                tags:
                  Name: {{ printf "%s-nodes-vpc-ingress" $params.friendlyName }}
              providerConfigRef:
                name: {{ $pcRef }}

            ---
            apiVersion: ec2.aws.upbound.io/v1beta1
            kind: SecurityGroupEgressRule
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: sgr-nodes-egress
                {{- if index $readyMap "sgr-nodes-egress" }}
                gotemplating.fn.crossplane.io/ready: "True"
                {{- end }}
            spec:
              forProvider:
                region: {{ $params.region }}
                securityGroupIdSelector:
                  matchControllerRef: true
                  matchLabels:
                    sg-for: eks-nodes
                cidrIpv4: "0.0.0.0/0"
                ipProtocol: "-1"
                description: Allow all outbound traffic
                tags:
                  Name: {{ printf "%s-nodes-egress" $params.friendlyName }}
              providerConfigRef:
                name: {{ $pcRef }}

            ---
            apiVersion: ec2.aws.upbound.io/v1beta1
            kind: SecurityGroup
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: sg-eks-control-plane
                {{- if index $readyMap "sg-eks-control-plane" }}
                gotemplating.fn.crossplane.io/ready: "True"
                {{- end }}
              labels:
                sg-for: eks-control-plane
            spec:
              forProvider:
                region: {{ $params.region }}
                description: Security group for EKS control plane
                vpcIdSelector:
                  matchControllerRef: true
                  matchLabels:
                    resource: vpc
                tags:
                  Name: {{ printf "%s-eks-control-plane-sg" $params.friendlyName }}
                  env: {{ $params.env }}
                  bu_id: {{ $params.buId }}
              providerConfigRef:
                name: {{ $pcRef }}

            ---
            apiVersion: ec2.aws.upbound.io/v1beta1
            kind: SecurityGroupIngressRule
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: sgr-cp-from-nodes-https
                {{- if index $readyMap "sgr-cp-from-nodes-https" }}
                gotemplating.fn.crossplane.io/ready: "True"
                {{- end }}
            spec:
              forProvider:
                region: {{ $params.region }}
                securityGroupIdSelector:
                  matchControllerRef: true
                  matchLabels:
                    sg-for: eks-control-plane
                referencedSecurityGroupIdSelector:
                  matchControllerRef: true
                  matchLabels:
                    sg-for: eks-nodes
                fromPort: 443
                toPort: 443
                ipProtocol: tcp
                description: Allow HTTPS from worker nodes
                tags:
                  Name: {{ printf "%s-cp-from-nodes-https" $params.friendlyName }}
              providerConfigRef:
                name: {{ $pcRef }}

            ---
            apiVersion: ec2.aws.upbound.io/v1beta1
            kind: SecurityGroupEgressRule
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: sgr-cp-to-nodes-https
                {{- if index $readyMap "sgr-cp-to-nodes-https" }}
                gotemplating.fn.crossplane.io/ready: "True"
                {{- end }}
            spec:
              forProvider:
                region: {{ $params.region }}
                securityGroupIdSelector:
                  matchControllerRef: true
                  matchLabels:
                    sg-for: eks-control-plane
                referencedSecurityGroupIdSelector:
                  matchControllerRef: true
                  matchLabels:
                    sg-for: eks-nodes
                fromPort: 443
                toPort: 443
                ipProtocol: tcp
                description: Allow HTTPS to worker nodes
                tags:
                  Name: {{ printf "%s-cp-to-nodes-https" $params.friendlyName }}
              providerConfigRef:
                name: {{ $pcRef }}

            ---
            apiVersion: ec2.aws.upbound.io/v1beta1
            kind: SecurityGroupEgressRule
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: sgr-cp-to-nodes-kubelet
                {{- if index $readyMap "sgr-cp-to-nodes-kubelet" }}
                gotemplating.fn.crossplane.io/ready: "True"
                {{- end }}
            spec:
              forProvider:
                region: {{ $params.region }}
                securityGroupIdSelector:
                  matchControllerRef: true
                  matchLabels:
                    sg-for: eks-control-plane
                referencedSecurityGroupIdSelector:
                  matchControllerRef: true
                  matchLabels:
                    sg-for: eks-nodes
                fromPort: 1025
                toPort: 65535
                ipProtocol: tcp
                description: Allow kubelet and extension API traffic to worker nodes
                tags:
                  Name: {{ printf "%s-cp-to-nodes-kubelet" $params.friendlyName }}
              providerConfigRef:
                name: {{ $pcRef }}

            ---
            apiVersion: ec2.aws.upbound.io/v1beta1
            kind: SecurityGroup
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: sg-aws-resources
                {{- if index $readyMap "sg-aws-resources" }}
                gotemplating.fn.crossplane.io/ready: "True"
                {{- end }}
              labels:
                sg-for: aws-resources
            spec:
              forProvider:
                region: {{ $params.region }}
                description: Security group for AWS managed resources (RDS, ElastiCache, etc.)
                vpcIdSelector:
                  matchControllerRef: true
                  matchLabels:
                    resource: vpc
                tags:
                  Name: {{ printf "%s-resources-sg" $params.friendlyName }}
                  env: {{ $params.env }}
                  bu_id: {{ $params.buId }}
              providerConfigRef:
                name: {{ $pcRef }}

            ---
            apiVersion: ec2.aws.upbound.io/v1beta1
            kind: SecurityGroupIngressRule
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: sgr-resources-from-nodes
                {{- if index $readyMap "sgr-resources-from-nodes" }}
                gotemplating.fn.crossplane.io/ready: "True"
                {{- end }}
            spec:
              forProvider:
                region: {{ $params.region }}
                securityGroupIdSelector:
                  matchControllerRef: true
                  matchLabels:
                    sg-for: aws-resources
                referencedSecurityGroupIdSelector:
                  matchControllerRef: true
                  matchLabels:
                    sg-for: eks-nodes
                ipProtocol: "-1"
                description: Allow all traffic from EKS nodes
                tags:
                  Name: {{ printf "%s-resources-from-nodes" $params.friendlyName }}
              providerConfigRef:
                name: {{ $pcRef }}

            ---
            apiVersion: ec2.aws.upbound.io/v1beta1
            kind: SecurityGroupEgressRule
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: sgr-resources-egress
                {{- if index $readyMap "sgr-resources-egress" }}
                gotemplating.fn.crossplane.io/ready: "True"
                {{- end }}
            spec:
              forProvider:
                region: {{ $params.region }}
                securityGroupIdSelector:
                  matchControllerRef: true
                  matchLabels:
                    sg-for: aws-resources
                cidrIpv4: {{ $params.vpcCidr }}
                ipProtocol: "-1"
                description: Allow all outbound traffic within VPC
                tags:
                  Name: {{ printf "%s-resources-egress" $params.friendlyName }}
              providerConfigRef:
                name: {{ $pcRef }}

    # -------------------------------------------------------------------------
    # Step 7 — VPC endpoints (conditional on enableVpcEndpoints).
    # Endpoint SG + 9 interface endpoints + 2 gateway endpoints.
    # external-name is stamped from observed state to prevent duplicate creation.
    # -------------------------------------------------------------------------
    - step: vpc-endpoints
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $params := .observed.composite.resource.spec.parameters }}
            {{- $obs    := default (dict) .observed.resources }}
            {{- $pcRef  := .observed.composite.resource.metadata.name }}

            {{- $readyMap := dict }}
            {{- range $crn, $res := $obs }}
            {{- range $res.resource.status.conditions }}
            {{- if and (eq .type "Ready") (eq .status "True") }}
            {{- $readyMap = merge $readyMap (dict $crn "True") }}
            {{- end }}
            {{- end }}
            {{- end }}

            {{- $ifaceEndpoints := list "ssm" "ssmmessages" "ec2messages" "kms" "ecr.api" "ecr.dkr" "ec2" "sts" "logs" }}
            {{- $gwEndpoints    := list "s3" "dynamodb" }}

            {{- if $params.enableVpcEndpoints }}

            ---
            apiVersion: ec2.aws.upbound.io/v1beta1
            kind: SecurityGroup
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: sg-vpc-endpoints
                {{- if index $readyMap "sg-vpc-endpoints" }}
                gotemplating.fn.crossplane.io/ready: "True"
                {{- end }}
              labels:
                sg-for: vpc-endpoints
            spec:
              forProvider:
                region: {{ $params.region }}
                description: Security group for VPC endpoints
                vpcIdSelector:
                  matchControllerRef: true
                  matchLabels:
                    resource: vpc
                tags:
                  Name: {{ printf "%s-vpc-endpoints-sg" $params.friendlyName }}
                  env: {{ $params.env }}
                  bu_id: {{ $params.buId }}
              providerConfigRef:
                name: {{ $pcRef }}

            ---
            apiVersion: ec2.aws.upbound.io/v1beta1
            kind: SecurityGroupIngressRule
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: sgr-endpoints-https
                {{- if index $readyMap "sgr-endpoints-https" }}
                gotemplating.fn.crossplane.io/ready: "True"
                {{- end }}
            spec:
              forProvider:
                region: {{ $params.region }}
                securityGroupIdSelector:
                  matchControllerRef: true
                  matchLabels:
                    sg-for: vpc-endpoints
                cidrIpv4: {{ $params.vpcCidr }}
                fromPort: 443
                toPort: 443
                ipProtocol: tcp
                description: Allow HTTPS from VPC CIDR
                tags:
                  Name: {{ printf "%s-endpoints-https" $params.friendlyName }}
              providerConfigRef:
                name: {{ $pcRef }}

            ---
            apiVersion: ec2.aws.upbound.io/v1beta1
            kind: SecurityGroupEgressRule
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: sgr-endpoints-egress
                {{- if index $readyMap "sgr-endpoints-egress" }}
                gotemplating.fn.crossplane.io/ready: "True"
                {{- end }}
            spec:
              forProvider:
                region: {{ $params.region }}
                securityGroupIdSelector:
                  matchControllerRef: true
                  matchLabels:
                    sg-for: vpc-endpoints
                cidrIpv4: "0.0.0.0/0"
                ipProtocol: "-1"
                description: Allow all outbound traffic
                tags:
                  Name: {{ printf "%s-endpoints-egress" $params.friendlyName }}
              providerConfigRef:
                name: {{ $pcRef }}

            {{- range $svc := $ifaceEndpoints }}
            {{- $safeKey := $svc | replace "." "-" }}
            {{- $epKey := printf "vpce-iface-%s" $safeKey }}
            {{- $epId := "" }}
            {{- if index $obs $epKey }}
            {{- $epId = (index $obs $epKey).resource.status.atProvider.id }}
            {{- end }}
            ---
            apiVersion: ec2.aws.upbound.io/v1beta1
            kind: VPCEndpoint
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: {{ $epKey }}
                {{- if index $readyMap $epKey }}
                gotemplating.fn.crossplane.io/ready: "True"
                {{- end }}
                {{- if $epId }}
                crossplane.io/external-name: {{ $epId }}
                {{- end }}
            spec:
              forProvider:
                region: {{ $params.region }}
                vpcEndpointType: Interface
                serviceName: {{ printf "com.amazonaws.%s.%s" $params.region $svc }}
                privateDnsEnabled: true
                vpcIdSelector:
                  matchControllerRef: true
                  matchLabels:
                    resource: vpc
                tags:
                  Name: {{ printf "%s-%s-endpoint" $params.friendlyName $safeKey }}
                  env: {{ $params.env }}
                  bu_id: {{ $params.buId }}
              providerConfigRef:
                name: {{ $pcRef }}
            {{- end }}{{/* end range ifaceEndpoints */}}

            {{- range $svc := $gwEndpoints }}
            {{- $gwKey := printf "vpce-gw-%s" $svc }}
            {{- $gwId := "" }}
            {{- if index $obs $gwKey }}
            {{- $gwId = (index $obs $gwKey).resource.status.atProvider.id }}
            {{- end }}
            ---
            apiVersion: ec2.aws.upbound.io/v1beta1
            kind: VPCEndpoint
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: {{ $gwKey }}
                {{- if index $readyMap $gwKey }}
                gotemplating.fn.crossplane.io/ready: "True"
                {{- end }}
                {{- if $gwId }}
                crossplane.io/external-name: {{ $gwId }}
                {{- end }}
            spec:
              forProvider:
                region: {{ $params.region }}
                vpcEndpointType: Gateway
                serviceName: {{ printf "com.amazonaws.%s.%s" $params.region $svc }}
                vpcIdSelector:
                  matchControllerRef: true
                  matchLabels:
                    resource: vpc
                tags:
                  Name: {{ printf "%s-%s-endpoint" $params.friendlyName $svc }}
                  env: {{ $params.env }}
                  bu_id: {{ $params.buId }}
              providerConfigRef:
                name: {{ $pcRef }}
            {{- end }}{{/* end range gwEndpoints */}}

            {{- end }}{{/* end if enableVpcEndpoints */}}

    # -------------------------------------------------------------------------
    # Step 8 — Write status back to the composite resource.
    # IDs are read from .observed.resources (available from 2nd reconcile).
    # -------------------------------------------------------------------------
    - step: write-status
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $params := .observed.composite.resource.spec.parameters }}
            {{- $name   := .observed.composite.resource.metadata.name }}
            {{- $obs    := default (dict) .observed.resources }}

            {{- $vpcId     := "" }}
            {{- $nodesSgId := "" }}
            {{- $cpSgId    := "" }}
            {{- $resSgId   := "" }}
            {{- if index $obs "vpc" }}{{- $vpcId = (index $obs "vpc").resource.status.atProvider.id }}{{- end }}
            {{- if index $obs "sg-eks-nodes" }}{{- $nodesSgId = (index $obs "sg-eks-nodes").resource.status.atProvider.id }}{{- end }}
            {{- if index $obs "sg-eks-control-plane" }}{{- $cpSgId = (index $obs "sg-eks-control-plane").resource.status.atProvider.id }}{{- end }}
            {{- if index $obs "sg-aws-resources" }}{{- $resSgId = (index $obs "sg-aws-resources").resource.status.atProvider.id }}{{- end }}

            {{- $eksSubnetIds := list }}
            {{- range $i, $az := $params.azs }}
            {{- $key := printf "subnet-eks-%d" $i }}
            {{- if index $obs $key }}
            {{- $id := (index $obs $key).resource.status.atProvider.id }}
            {{- if $id }}{{- $eksSubnetIds = append $eksSubnetIds $id }}{{- end }}
            {{- end }}
            {{- end }}

            {{- $resSubnetIds := list }}
            {{- range $i, $az := $params.azs }}
            {{- $key := printf "subnet-res-%d" $i }}
            {{- if index $obs $key }}
            {{- $id := (index $obs $key).resource.status.atProvider.id }}
            {{- if $id }}{{- $resSubnetIds = append $resSubnetIds $id }}{{- end }}
            {{- end }}
            {{- end }}

            {{- $pubSubnetIds := list }}
            {{- range $i, $az := $params.azs }}
            {{- $key := printf "subnet-pub-%d" $i }}
            {{- if index $obs $key }}
            {{- $id := (index $obs $key).resource.status.atProvider.id }}
            {{- if $id }}{{- $pubSubnetIds = append $pubSubnetIds $id }}{{- end }}
            {{- end }}
            {{- end }}

            ---
            apiVersion: networking.platform.urukube.io/v1alpha1
            kind: XUNetwork
            metadata:
              name: {{ $name }}
            status:
              vpcId: {{ $vpcId | quote }}
              nodeSecurityGroupId: {{ $nodesSgId | quote }}
              controlPlaneSecurityGroupId: {{ $cpSgId | quote }}
              resourcesSecurityGroupId: {{ $resSgId | quote }}
              eksNodeSubnetIds:
                {{- if $eksSubnetIds }}
                {{- range $eksSubnetIds }}
                - {{ . | quote }}
                {{- end }}
                {{- else }}
                []
                {{- end }}
              resourceSubnetIds:
                {{- if $resSubnetIds }}
                {{- range $resSubnetIds }}
                - {{ . | quote }}
                {{- end }}
                {{- else }}
                []
                {{- end }}
              publicSubnetIds:
                {{- if $pubSubnetIds }}
                {{- range $pubSubnetIds }}
                - {{ . | quote }}
                {{- end }}
                {{- else }}
                []
                {{- end }}
